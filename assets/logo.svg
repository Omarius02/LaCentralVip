    <line x1="-5" y1="-10" x2="-8" y2="-1" stroke-width="2.5" stroke="#c9a84c"/>
    <line x1="1" y1="-10" x2="-2" y2="-1" stroke-width="2.5" stroke="#c9a84c"/>
    <line x1="7" y1="-10" x2="4" y2="-1" stroke-width="2.5" stroke="#c9a84c"/>
    <line x1="-11" y1="-5" x2="11" y2="-5" stroke-width="0.8"/>
