  <circle cx="136" cy="311" r="20" fill="#080f22" stroke="url(#goldG)" stroke-width="1.5"/>
  <g transform="translate(136,311)" fill="none" stroke="#c9a84c" stroke-width="1.7" stroke-linecap="round">
