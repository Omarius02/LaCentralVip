<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bgG" cx="50%" cy="38%" r="62%">
      <stop offset="0%" stop-color="#0e1b3e"/>
      <stop offset="65%" stop-color="#080f22"/>
      <stop offset="100%" stop-color="#040810"/>
    </radialGradient>
    <linearGradient id="goldG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5e492"/>
      <stop offset="30%" stop-color="#d4a83c"/>
      <stop offset="65%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#8a6820"/>
    </linearGradient>
    <linearGradient id="cvG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8eb96"/>
      <stop offset="25%" stop-color="#e2c254"/>
      <stop offset="60%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#7a5e1c"/>
    </linearGradient>
    <linearGradient id="cvGH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f5e492"/>
      <stop offset="50%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#8a6820"/>
    </linearGradient>
    <clipPath id="clip">
