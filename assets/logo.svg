    <line x1="200" y1="200" x2="311" y2="136"/>
    <line x1="200" y1="200" x2="311" y2="264"/>
    <line x1="200" y1="200" x2="264" y2="311"/>
    <line x1="200" y1="200" x2="136" y2="311"/>
    <line x1="200" y1="200" x2="72" y2="200"/>
    <line x1="200" y1="200" x2="136" y2="89"/>
