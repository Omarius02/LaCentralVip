    <circle cx="120" cy="80" r="2.5" fill="#05d8c0" stroke="none"/>
    <circle cx="160" cy="80" r="2.5" fill="#05d8c0" stroke="none"/>
    <circle cx="200" cy="80" r="2.5" fill="#05d8c0" stroke="none"/>
    <circle cx="240" cy="80" r="2.5" fill="#05d8c0" stroke="none"/>
    <circle cx="280" cy="80" r="2.5" fill="#05d8c0" stroke="none"/>
    <circle cx="320" cy="80" r="2.5" fill="#05d8c0" stroke="none"/>
    <circle cx="80" cy="120" r="2.5" fill="#05d8c0" stroke="none"/>
    <circle cx="120" cy="120" r="2.5" fill="#05d8c0" stroke="none"/>
    <circle cx="160" cy="120" r="2.5" fill="#05d8c0" stroke="none"/>
    <circle cx="240" cy="120" r="2.5" fill="#05d8c0" stroke="none"/>
    <circle cx="280" cy="120" r="2.5" fill="#05d8c0" stroke="none"/>
    <circle cx="320" cy="120" r="2.5" fill="#05d8c0" stroke="none"/>
    <circle cx="80" cy="160" r="2.5" fill="#05d8c0" stroke="none"/>
    <circle cx="120" cy="160" r="2.5" fill="#05d8c0" stroke="none"/>
    <circle cx="280" cy="160" r="2.5" fill="#05d8c0" stroke="none"/>
    <circle cx="320" cy="160" r="2.5" fill="#05d8c0" stroke="none"/>
    <circle cx="80" cy="200" r="2.5" fill="#05d8c0" stroke="none"/>
    <circle cx="320" cy="200" r="2.5" fill="#05d8c0" stroke="none"/>
    <circle cx="80" cy="240" r="2.5" fill="#05d8c0" stroke="none"/>
    <circle cx="320" cy="240" r="2.5" fill="#05d8c0" stroke="none"/>
    <circle cx="80" cy="280" r="2.5" fill="#05d8c0" stroke="none"/>
    <circle cx="120" cy="280" r="2.5" fill="#05d8c0" stroke="none"/>
    <circle cx="160" cy="280" r="2.5" fill="#05d8c0" stroke="none"/>
