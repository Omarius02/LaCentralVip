  <!-- LA CENTRAL VIP -->
  <text x="200" y="262"
    text-anchor="middle"
    font-family="'Arial Black', 'Arial', sans-serif"
    font-size="22" font-weight="900"
    fill="url(#goldG)"
    letter-spacing="3.5">LA CENTRAL VIP</text>

  <!-- Thin gold line divider -->
  <line x1="84" y1="272" x2="316" y2="272" stroke="url(#goldG)" stroke-width="0.9" opacity="0.5"/>

  <!-- SERVICIOS PREMIUM AL MEJOR PRECIO -->
  <text x="200" y="288"
    text-anchor="middle"
    font-family="'Arial', sans-serif"
    font-size="9" font-weight="500"
    fill="url(#goldG)"
    letter-spacing="3.8">SERVICIOS PREMIUM AL MEJOR PRECIO</text>

  <!-- INFO: @pepe1312x pill -->
  <rect x="114" y="337" width="172" height="27" rx="13.5" fill="none" stroke="url(#goldG)" stroke-width="1.5"/>
  <text x="200" y="355"
    text-anchor="middle"
    font-family="'Arial', sans-serif"
    font-size="11" font-weight="600"
