    <path d="M-5,-8 C-5,-3 5,-3 5,-8" stroke-width="1.4"/>
    <path d="M-1,-8 C-1,-3 0,-1 0,1" stroke-width="1.4"/>
  </g>

  <!-- ICON: Football (left, 180°) at (72, 200) -->
  <circle cx="72" cy="200" r="20" fill="#080f22" stroke="url(#goldG)" stroke-width="1.5"/>
  <circle cx="72" cy="200" r="12" fill="none" stroke="#c9a84c" stroke-width="1.4"/>
  <polygon points="72,193 75.5,196 74,200.5 70,200.5 68.5,196" fill="none" stroke="#c9a84c" stroke-width="1.4"/>
  <line x1="72" y1="188" x2="72" y2="193" stroke="#c9a84c" stroke-width="1.2"/>
  <line x1="83" y1="197" x2="75.5" y2="196" stroke="#c9a84c" stroke-width="1.2"/>
  <line x1="79" y1="210" x2="74" y2="200.5" stroke="#c9a84c" stroke-width="1.2"/>
  <line x1="65" y1="210" x2="70" y2="200.5" stroke="#c9a84c" stroke-width="1.2"/>
  <line x1="61" y1="197" x2="68.5" y2="196" stroke="#c9a84c" stroke-width="1.2"/>

  <!-- ICON: TV monitor (upper-left, 240°) at (136, 89) -->
  <circle cx="136" cy="89" r="20" fill="#080f22" stroke="url(#goldG)" stroke-width="1.5"/>
  <g transform="translate(136,89)" fill="none" stroke="#c9a84c" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round">
    <rect x="-12" y="-10" width="24" height="17" rx="2"/>
    <line x1="-5" y1="7" x2="-5" y2="11"/>
    <line x1="5" y1="7" x2="5" y2="11"/>
    <line x1="-7" y1="11" x2="7" y2="11"/>
