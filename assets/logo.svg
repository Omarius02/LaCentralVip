  <!-- ICON: Shirt (top, 270°) at (200, 72) -->
  <circle cx="200" cy="72" r="20" fill="#080f22" stroke="url(#goldG)" stroke-width="1.5"/>
  <g transform="translate(200,72)" fill="none" stroke="#c9a84c" stroke-width="1.7" stroke-linejoin="round" stroke-linecap="round">
    <path d="M-9,2 C-7,-4 7,-4 9,2"/>
    <polyline points="-9,2 -9,12 9,12 9,2"/>
    <polyline points="-9,2 -15,-2 -13,6 -9,5"/>
    <polyline points="9,2 15,-2 13,6 9,5"/>
  </g>

