    <rect x="4.5" y="-9" width="2" height="16" rx="1"/>
    <path d="M6.5,-9 C13,-7 13,0 6.5,3" fill="none" stroke="#c9a84c" stroke-width="2"/>
  </g>

  <!-- ICON: Film clapperboard (right, 30°) at (311, 264) -->
